name: Aggiorna Dashboard

on:
  schedule:
    # Gira lun-ven alle 08:00, 13:00 e 18:00 (UTC, quindi in Italia alle 09, 14, 19 circa)
    - cron: '0 8,12,13,16 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Installa librerie
        run: pip install requests beautifulsoup4
        
      - name: Estrai Orari e Crea Sito
        env:
          SOLARI_USER: ${{ secrets.SOLARI_USER }}
          SOLARI_PASS: ${{ secrets.SOLARI_PASS }}
          SOLARI_ID: ${{ secrets.SOLARI_ID }}
        run: python timbrature.py

      - name: Salva e pubblica su GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Aggiornamento orari dashboard" || echo "Nessun nuovo dato"
          git push
